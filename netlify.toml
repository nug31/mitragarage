[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy (optional - if you want to proxy API calls)
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.railway.app/api/:splat"
#   status = 200
#   force = true

