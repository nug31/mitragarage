<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Railway API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚂 Railway API Connection Test</h1>
    
    <div>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <button onclick="testAPI()">Test API Endpoint</button>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testCORS()">Test CORS</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'https://mitragarage-production.up.railway.app';
        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
        }

        async function testHealth() {
            addResult('🔍 Testing health endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const text = await response.text();
                addResult(`✅ Health endpoint: ${response.status} - ${text}`, 'success');
            } catch (error) {
                addResult(`❌ Health endpoint failed: ${error.message}`, 'error');
            }
        }

        async function testAPI() {
            addResult('🔍 Testing API endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/auth/users`);
                const data = await response.json();
                addResult(`✅ API endpoint: ${response.status} - ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                addResult(`❌ API endpoint failed: ${error.message}`, 'error');
            }
        }

        async function testLogin() {
            addResult('🔍 Testing login...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                const data = await response.json();
                addResult(`✅ Login: ${response.status} - ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                addResult(`❌ Login failed: ${error.message}`, 'error');
            }
        }

        async function testCORS() {
            addResult('🔍 Testing CORS...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/auth/users`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': 'https://mitragarage-app.netlify.app',
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                addResult(`✅ CORS preflight: ${response.status}`, 'success');
                
                // Check CORS headers
                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers')
                };
                addResult(`📋 CORS Headers: ${JSON.stringify(corsHeaders)}`, 'info');
            } catch (error) {
                addResult(`❌ CORS test failed: ${error.message}`, 'error');
            }
        }

        // Auto-run tests on load
        window.onload = function() {
            addResult('🚀 Starting automatic tests...', 'info');
            setTimeout(testHealth, 1000);
            setTimeout(testAPI, 2000);
            setTimeout(testCORS, 3000);
        };
    </script>
</body>
</html>
